<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Axon Dashboard</title>

<style>
body {
  margin: 0;
  font-family: -apple-system;
  background: #000;
  color: #fff;
}

.header {
  background: #fff;
  padding: 12px;
  text-align: center;
}

.logo {
  height: 50px;
}

.title {
  text-align: center;
  font-size: 22px;
  margin: 10px;
}

/* STATS */
.card {
  background: #111;
  margin: 12px;
  padding: 18px;
  border-radius: 16px;
  text-align: center;
}

.number {
  font-size: 26px;
  font-weight: bold;
}

.green { color: #22c55e; }
.red { color: #ef4444; }

/* SEARCH */
.search {
  padding: 10px;
}

input {
  width: 100%;
  padding: 14px;
  font-size: 16px;
  border-radius: 12px;
  border: none;
}

/* LIST */
.row {
  background: #111;
  margin: 10px;
  padding: 12px;
  border-radius: 12px;
}

.name {
  font-size: 16px;
  font-weight: bold;
}

.id {
  font-size: 13px;
  color: #aaa;
}

.time {
  font-size: 12px;
  color: #777;
}

button {
  width: 90%;
  margin: 10px auto;
  display: block;
  padding: 14px;
  border-radius: 12px;
  border: none;
  background: #fff;
  color: #000;
}
</style>
</head>

<body>

<div class="header">
  <img src="https://static.wixstatic.com/media/3766d4_4962ad5501214d35bf25ee6fd86a4da2~mv2.png" class="logo">
</div>

<div class="title">Dashboard</div>

<div class="card">
  Total<br><span id="total" class="number">0</span>
</div>

<div class="card">
  <span class="green">Checked-In</span><br>
  <span id="checked" class="number green">0</span>
</div>

<div class="card">
  <span class="red">Pending</span><br>
  <span id="pending" class="number red">0</span>
</div>

<div class="search">
  <input id="search" placeholder="Search name or ID" oninput="searchData()">
</div>

<button onclick="loadData()">&#x1F504; Refresh</button>

<div id="list"></div>

<script>
const API = "https://script.google.com/macros/s/AKfycbyhHdXJYpMb9seu5jyuPjPNX-7NiE4hZShDY7NUTauKGzuWFwZq7s8G5KaYxUekyr1I/exec";

let globalList = [];

async function loadData() {
  try {
    let res = await fetch(API + "?dashboard=1");
    let data = await res.json();

    globalList = data.list || [];

    document.getElementById("total").innerText = data.total;
    document.getElementById("checked").innerText = data.checked;
    document.getElementById("pending").innerText = data.pending;

    render(globalList);

  } catch (e) {
    alert("Dashboard error");
  }
}

function render(list) {
  let html = "";

  list.forEach(p => {
    html += `
      <div class="row">
        <div class="name">${p.name}</div>
        <div class="id">${p.id}</div>
        <div class="${p.status === 'Checked-In' ? 'green' : 'red'}">
          ${p.status}
        </div>
        <div class="time">${p.time}</div>
      </div>
    `;
  });

  document.getElementById("list").innerHTML = html;
}

/* 🔍 SEARCH */
function searchData() {
  const q = document.getElementById("search").value.toLowerCase();

  const filtered = globalList.filter(p =>
    p.name.toLowerCase().includes(q) ||
    p.id.toLowerCase().includes(q)
  );

  render(filtered);
}

/* LOAD */
async function loadData() {
  try {
    let res = await fetch(API + "?dashboard=1");

    if (!res.ok) throw new Error("Server error");

    let data = await res.json();

    globalList = data.list || [];

    document.getElementById("total").innerText = data.total;
    document.getElementById("checked").innerText = data.checked;
    document.getElementById("pending").innerText = data.pending;

    render(globalList);

  } catch (err) {
    console.log(err);
    alert("❌ Dashboard failed to load");
  }
}
</script>

</body>
</html>
