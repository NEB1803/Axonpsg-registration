<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Axon Check-In</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI';
  background: #000;
  color: #fff;
}

/* HEADER */
.header {
  background: #fff;
  padding: 14px;
  text-align: center;
}

.logo {
  height: 50px;
}

/* TITLE */
.title {
  text-align: center;
  font-size: 22px;
  font-weight: bold;
  margin: 15px 10px;
}

/* INPUT AREA */
.search-container {
  padding: 0 12px;
}

input {
  width: 100%;
  padding: 16px;
  font-size: 18px;
  border-radius: 12px;
  border: none;
  margin-bottom: 10px;
}

button {
  width: 100%;
  padding: 16px;
  font-size: 18px;
  border-radius: 12px;
  border: none;
  margin-bottom: 10px;
  background: #fff;
  color: #000;
  font-weight: bold;
}

.scan-btn {
  background: #22c55e;
  color: white;
}

/* QR SCANNER */
#reader {
  margin: 10px;
}

/* RESULT */
#result {
  padding: 12px;
}

/* CARDS */
.card {
  background: #111;
  padding: 18px;
  border-radius: 16px;
  margin-top: 10px;
  text-align: center;
}

.valid { border: 2px solid #22c55e; }
.invalid { border: 2px solid #ef4444; }
.warning { border: 2px solid #f59e0b; }

.status-title {
  font-size: 22px;
  font-weight: bold;
  margin-bottom: 10px;
}

.name {
  font-size: 20px;
  font-weight: bold;
}

/* LOADING */
#loading {
  display: none;
  text-align: center;
  margin-top: 20px;
}

.spinner {
  width: 40px;
  height: 40px;
  border: 4px solid #333;
  border-top: 4px solid #fff;
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin: auto;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}
</style>
</head>

<body>

<div class="header">
  <img src="https://static.wixstatic.com/media/3766d4_4962ad5501214d35bf25ee6fd86a4da2~mv2.png" class="logo">
</div>

<div class="title">Axon PSG 2026 Check-In</div>

<div class="search-container">

  <button class="scan-btn" onclick="startScanner()">&#x1F4F7; Scan QR</button>

  <div id="reader"></div>

  <input id="manualId" placeholder="Paste QR link or enter Delegate ID">

  <button onclick="manualSearch()">Search Delegate</button>

</div>

<!-- LOADING -->
<div id="loading">
  <div class="spinner"></div>
  <div>Checking...</div>
</div>

<!-- RESULT -->
<div id="result"></div>

<script>
const API = "https://script.google.com/macros/s/AKfycbyhHdXJYpMb9seu5jyuPjPNX-7NiE4hZShDY7NUTauKGzuWFwZq7s8G5KaYxUekyr1I/exec";

function playSuccess() {
  new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg").play();
}

function playError() {
  new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg").play();
}

function playWarning() {
  new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg").play();
}

function extractId(text) {
  if (text.includes("wixevents")) {
    return text.split("/check-in/")[1].split(",")[0];
  }
  return text.trim();
}

/* ⏳ FETCH DATA */
async function fetchData(id) {
  try {
    document.getElementById("loading").style.display = "block";
    document.getElementById("result").innerHTML = "";

    let res = await fetch(API + "?id=" + id);

    if (!res.ok) throw new Error("Server error");

    let data = await res.json();

    document.getElementById("loading").style.display = "none";

    showResult(data);

  } catch (err) {
    document.getElementById("loading").style.display = "none";
    alert("❌ Unable to connect to server");
  }
}

/* 📷 SCANNER */
function startScanner() {
  const qr = new Html5Qrcode("reader");

  qr.start(
    { facingMode: "environment" },
    { fps: 10 },
    (text) => {
      qr.stop();
      fetchData(extractId(text));
    }
  );
}

/* 🔍 SEARCH */
function manualSearch() {
  let val = document.getElementById("manualId").value;
  if (!val) return;

  fetchData(extractId(val));
}

/* 🔄 RESET */
function resetScreen() {
  document.getElementById("result").innerHTML = "";
}

/* 🎯 RESULT DISPLAY */
function showResult(res) {
  const div = document.getElementById("result");

  if (res.status === "NOT_FOUND") {
    playError();

    div.innerHTML = `
      <div class="card invalid">
        <div class="status-title">\u274C NOT REGISTERED</div>
        <button onclick="resetScreen()">\u{1F504} Next</button>
      </div>`;
    return;
  }

  if (res.status === "ALREADY") {
    playWarning();

    div.innerHTML = `
      <div class="card warning">
        <div class="status-title">\u26A0\uFE0F ALREADY CHECKED-IN</div>
        <div class="name">${res.name}</div>
        <button onclick="resetScreen()">\u{1F504} Next</button>
      </div>`;
    return;
  }

  if (res.status === "VALID") {
    playSuccess();

    div.innerHTML = `
      <div class="card valid">
        <div class="status-title">\u2705 VALID ENTRY</div>
        <div class="name">${res.name}</div>
        <button onclick="resetScreen()">\u{1F504} Next</button>
      </div>`;
  }
}
</script>

</body>
</html>
