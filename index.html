<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="manifest" href="/site.webmanifest">
<title>Axon Check-In</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
  
body {
  margin: 0;
  display: flex;
  flex-direction: column;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI';
  background: #000;
  color: #fff;
}

.header {
  background: #fff;
  padding: 14px;
  text-align: center;
}

.logo { height: 50px; }

.title {
  text-align: center;
  font-size: 22px;
  font-weight: bold;
  margin: 15px;
}

.search-container { 
    padding: 0 12px; 
    justify-content: center; 
    align-items: center;
}

input {
  width: 95%;
  padding: 16px;
  font-size: 18px;
  justify-content: center; 
  border-radius: 12px;
  align-items: center;
  border: none;
  margin-bottom: 10px;
}

button {
  width: 100%;
  padding: 16px;
  font-size: 18px;
  border-radius: 12px;
  border: none;
  margin-bottom: 10px;
  background: #fff;
  color: #000;
  font-weight: bold;
}

.scan-btn { background: #22c55e; color: white; }

#reader { margin: 10px; }
#result { padding: 12px; }

.card {
  background: #111;
  padding: 18px;
  border-radius: 16px;
  margin-top: 10px;
}

.valid { border: 2px solid #22c55e; }
.invalid { border: 2px solid #ef4444; }
.warning { border: 2px solid #f59e0b; }

.field { margin: 6px 0; font-size: 15px; }
.name { font-size: 20px; font-weight: bold; }

/* LOADING */
#loading {
  display: none;
  text-align: center;
  margin-top: 20px;
}

.spinner {
  width: 40px;
  height: 40px;
  border: 4px solid #333;
  border-top: 4px solid #fff;
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin: auto;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

footer {
    background-color: #1c1c1c;
    color: white;
    text-align: center;
    padding: 10px;
    left: 0;
    bottom: 0;
    width: 100%;
    position: static;
    clear: both;
    z-index: 1;
}

footer a {
    color: #fff;
    text-align: justify;
    font-style: normal;
    text-decoration: none;
}
footer a:hover {
    text-decoration: underline;
}
</style>
</head>

<body>

<div class="header">
  <img src="https://static.wixstatic.com/media/3766d4_4962ad5501214d35bf25ee6fd86a4da2~mv2.png" class="logo">
</div>

<div class="title">Axon PSG 2026 Check-In</div>

<div class="search-container">

  <button class="scan-btn" onclick="startScanner()">
    &#x1F4F7; Scan QR
  </button>

  <div id="reader"></div>

  <input id="manualId" placeholder="Paste QR link or enter Delegate ID">

  <button onclick="manualSearch()">Search Delegate</button>

</div>

<div id="loading">
  <div class="spinner"></div>
  <div>Checking...</div>
</div>

<div id="result"></div>

<script>
const API = "https://script.google.com/macros/s/AKfycbxjJ1cCHHj4YGdBGECh0d7phbRKkbdfI2aQqZc_GcDHK5lUF05RS20SBbxd9DgxnBZxfw/exec";

/* SOUND */
function playSuccess() {
  new Audio("/yes.ogg").play();
}
function playError() {
  new Audio("https://actions.google.com/sounds/v1/cartoon/cartoon_boing.ogg").play();
}
function playWarning() {
  new Audio("https://actions.google.com/sounds/v1/weather/thunder_crack.ogg").play();
}

/* EXTRACT ID */
function extractId(text) {
  try {
    text = text.trim();
    const match = text.match(/check-in\/([^,]+)/);
    if (match && match[1]) return match[1];
    return text;
  } catch {
    return text;
  }
}

const workshopColors = {
  "Suturing": "#ef4444",
  "Emergency": "#3b82f6",
  "Radiology": "#22c55e",
  "Quiz": "#eab308",
  "Default": "#6b7280"
};

function getColor(w) {
  for (let key in workshopColors) {
    if (w.toLowerCase().includes(key.toLowerCase())) {
      return workshopColors[key];
    }
  }
  return workshopColors["Default"];
}

function formatWorkshops(workshops) {
  if (!workshops) return "";

  let html = "<div style='margin-top:10px'>";
  
  workshops.split(",").forEach(w => {
    html += `
      <span style="
        display:inline-block;
        padding:6px 12px;
        margin:4px;
        border-radius:20px;
        background:${getColor(w)};
        color:white;
        font-size:14px;
      ">
        ${w.trim()}
      </span>
    `;
  });

  html += "</div>";
  return html;
}

/* FETCH */
async function fetchData(id) {
  try {
    document.getElementById("loading").style.display = "block";
    document.getElementById("result").innerHTML = "";

    let res = await fetch(API + "?id=" + id);
    if (!res.ok) throw new Error();

    let data = await res.json();

    document.getElementById("loading").style.display = "none";
    showResult(data);

  } catch {
    document.getElementById("loading").style.display = "none";
    alert("Server error / Check internet");
  }
}

/* SCANNER */
function startScanner() {
  const qr = new Html5Qrcode("reader");

  qr.start({ facingMode: "environment" }, { fps: 10 }, (text) => {
    qr.stop();
    fetchData(extractId(text));
  });
}

/* SEARCH */
function manualSearch() {
  let val = document.getElementById("manualId").value;
  if (!val) return;
  fetchData(extractId(val));
}

/* RESET */
function resetScreen() {
  document.getElementById("result").innerHTML = "";
}

/* RESULT */
function showResult(res) {
  const div = document.getElementById("result");

  if (res.status === "NOT_FOUND") {
    playError();
    div.innerHTML = `
      <div class="card invalid">
        &#x274C; NOT REGISTERED
        <button onclick="resetScreen()">Next</button>
      </div>`;
    return;
  }

  const details = `
    <div class="name">${res.firstName} ${res.lastName}</div>

    <div class="field">&#x1F194; ${res.id}</div>
    <div class="field">&#x1F4E7; ${res.email}</div>
    <div class="field">&#x1F4DE; ${res.phone}</div>
    <div class="field">&#x1F3EB; ${res.institution}</div>
    <div class="field">&#x1F4CD; ${res.address}</div>
    <div class="field">&#x1F393; ${res.year}</div>

    <div class="field"><b>Events:</b></div>
    ${formatWorkshops(res.workshops)}
    `;

  if (res.status === "ALREADY") {
    playWarning();
    div.innerHTML = `
      <div class="card warning">
        &#x26A0;&#xFE0F; ALREADY CHECKED-IN
        ${details}
        <button onclick="resetScreen()">Next</button>
      </div>`;
    return;
  }

  if (res.status === "VALID") {
    playSuccess();
    div.innerHTML = `
      <div class="card valid">
        &#x2705; VALID ENTRY
        ${details}
        <button onclick="resetScreen()">Next</button>
      </div>`;
  }
}
</script>

</body>
<footer>
    <p>&copy; 2026 Axon 2026 All rights reserved.</p>

        <a href="https://github.com/NEB1803">Github </a><a href="https://neb1803.tech"> Contact</a>
    </ul>
</footer>

</html>
