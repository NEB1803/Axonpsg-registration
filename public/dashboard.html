<!DOCTYPE html>
<html class="dark">
<head>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white p-4">

<script>
if(!localStorage.getItem("auth")) location="/";
</script>

<h1 class="text-green-400 text-xl mb-4">Dashboard</h1>

<div class="grid grid-cols-3 gap-3">
<div>Total <h2 id="t">0</h2></div>
<div>Checked <h2 id="c">0</h2></div>
<div>Pending <h2 id="p">0</h2></div>
</div>

<script>
async function load(){
  let r=await fetch("/api/dashboard");
  let d=await r.json();

  t.innerText=d.total;
  c.innerText=d.checked;
  p.innerText=d.pending;
}

setInterval(load,3000);
load();
</script>

</body>
</html>
