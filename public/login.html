<!DOCTYPE html>
<html class="dark">
<head>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white flex items-center justify-center h-screen">

<div class="bg-zinc-900 p-6 rounded-xl w-80">
<h1 class="text-green-400 text-xl mb-4 text-center">AXON LOGIN</h1>

<input id="u" class="w-full p-2 mb-2 text-black" placeholder="Username">
<input id="p" type="password" class="w-full p-2 mb-4 text-black" placeholder="Password">

<button onclick="login()" class="w-full bg-green-500 p-2 rounded">
Login
</button>
</div>

<script>
async function login(){
  let res=await fetch(`/api/login?username=${u.value}&password=${p.value}`);
  let data=await res.json();

  if(data.status==="SUCCESS"){
    localStorage.setItem("auth","1");
    location.href="/index.html";
  } else alert("Invalid");
}
</script>

</body>
</html>
